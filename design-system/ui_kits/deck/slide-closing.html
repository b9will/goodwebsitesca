<!-- @dsCard group="Slides" viewport="1280x720" name="Closing / CTA" subtitle="Dark closing slide with sun CTA" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;}
  .slide{width:1280px;height:720px;background:var(--ink-900);color:var(--paper-50);font-family:var(--font-sans);padding:72px 80px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
  .top{display:flex;align-items:center;gap:14px;}
  .word{font-family:var(--font-display);font-weight:500;font-size:28px;color:var(--paper-50);letter-spacing:-.02em;}
  h2{font-family:var(--font-display);font-weight:500;font-size:92px;line-height:1;letter-spacing:-.03em;margin:0;max-width:16ch;}
  .cta{display:inline-flex;align-items:center;gap:12px;background:var(--sun-400);color:var(--ink-900);border:2px solid var(--ink-900);border-radius:999px;padding:18px 32px;font-weight:700;font-size:22px;box-shadow:6px 6px 0 0 var(--sun-600);align-self:flex-start;margin-top:30px;}
  .contact{display:flex;gap:48px;font-size:20px;color:var(--paper-100);}
  .contact b{display:block;font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--sun-400);margin-bottom:6px;font-weight:700;}
  .glow{position:absolute;right:-160px;bottom:-200px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,var(--sun-600),transparent 70%);opacity:.5;}
</style>
</head>
<body>
<div class="slide">
  <div class="glow"></div>
  <div class="top"><img src="../../assets/logo/gw-mark-sun.svg" width="38" height="38" alt="" /><span class="word">Good&nbsp;Websites</span></div>
  <div>
    <h2>Let&rsquo;s make you a good one.</h2>
    <div class="cta">Start a project →</div>
  </div>
  <div class="contact">
    <div><b>Email</b>hello@goodwebsites.studio</div>
    <div><b>Phone</b>+44 20 7946 0000</div>
    <div><b>Studio</b>Sunny Yard, Bristol</div>
  </div>
</div>
</body>
</html>
