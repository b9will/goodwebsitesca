<!-- @dsCard group="Slides" viewport="1280x720" name="Section Divider" subtitle="Dark ink divider with big index numeral" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;}
  .slide{width:1280px;height:720px;background:var(--ink-900);color:var(--paper-50);font-family:var(--font-sans);display:flex;flex-direction:column;justify-content:center;padding:72px 80px;box-sizing:border-box;position:relative;}
  .idx{font-family:var(--font-display);font-weight:500;font-size:200px;line-height:1;color:var(--sun-400);letter-spacing:-.04em;}
  h2{font-family:var(--font-display);font-weight:500;font-size:72px;letter-spacing:-.03em;margin:8px 0 0;}
  p{font-size:22px;color:var(--paper-100);max-width:46ch;line-height:1.5;margin:22px 0 0;}
  .foot{position:absolute;left:80px;bottom:56px;display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-400);font-weight:600;letter-spacing:.04em;}
</style>
</head>
<body>
<div class="slide">
  <div class="idx">02</div>
  <h2>Our approach</h2>
  <p>How we&rsquo;ll take Bright Bakery from a sad little site to a bright, busy one — in four easy steps.</p>
  <div class="foot"><img src="../../assets/logo/gw-mark-sun.svg" width="22" height="22" alt="" />Good Websites · Proposal</div>
</div>
</body>
</html>
