<!-- @dsCard group="Slides" viewport="1280x720" name="Cover Slide" subtitle="Pitch / proposal cover on sun gold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;}
  .slide{width:1280px;height:720px;background:var(--sun-400);color:var(--ink-900);font-family:var(--font-sans);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:64px 72px;box-sizing:border-box;}
  .top{display:flex;align-items:center;gap:14px;}
  .word{font-family:var(--font-display);font-weight:500;font-size:30px;letter-spacing:-.02em;}
  .eyebrow{font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
  h1{font-family:var(--font-display);font-weight:500;font-size:104px;line-height:.98;letter-spacing:-.03em;margin:0;max-width:18ch;}
  .meta{display:flex;gap:40px;font-size:18px;color:var(--ink-700);font-weight:500;}
  .meta b{display:block;color:var(--ink-900);font-weight:700;font-size:15px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
  .ray{position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;border:3px solid var(--ink-900);opacity:.16;}
  .ray2{position:absolute;right:-40px;top:-40px;width:260px;height:260px;border-radius:50%;border:3px solid var(--ink-900);opacity:.16;}
</style>
</head>
<body>
<div class="slide">
  <div class="ray"></div><div class="ray2"></div>
  <div class="top"><img src="../../assets/logo/gw-mark-sun-ink.svg" width="40" height="40" alt="" /><span class="word">Good&nbsp;Websites</span></div>
  <div>
    <div class="eyebrow" style="margin-bottom:22px;">Website Proposal</div>
    <h1>A bright new site for Bright Bakery.</h1>
  </div>
  <div class="meta">
    <div><b>Prepared for</b>Mara Quinn</div>
    <div><b>From</b>The Good Websites Studio</div>
    <div><b>Date</b>March 2026</div>
  </div>
</div>
</body>
</html>
