<!-- @dsCard group="Slides" viewport="1280x720" name="Quote" subtitle="Big testimonial on cream" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;}
  .slide{width:1280px;height:720px;background:var(--surface-page-alt);color:var(--ink-900);font-family:var(--font-sans);padding:80px 96px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;position:relative;}
  .mark{font-family:var(--font-display);font-size:140px;line-height:.6;color:var(--sun-500);height:70px;}
  blockquote{font-family:var(--font-display);font-weight:400;font-size:58px;line-height:1.18;letter-spacing:-.02em;margin:24px 0 0;max-width:24ch;}
  .by{margin-top:40px;display:flex;align-items:center;gap:16px;}
  .av{width:60px;height:60px;border-radius:50%;background:var(--coral-500);border:2px solid var(--ink-900);display:flex;align-items:center;justify-content:center;color:var(--paper-50);font-weight:700;font-size:22px;}
  .name{font-weight:700;font-size:22px;}
  .role{color:var(--text-muted);font-size:18px;}
</style>
</head>
<body>
<div class="slide">
  <div class="mark">&ldquo;</div>
  <blockquote>Honestly? The easiest, sunniest project we&rsquo;ve ever run.</blockquote>
  <div class="by">
    <div class="av">MQ</div>
    <div><div class="name">Mara Quinn</div><div class="role">Owner, Bright Bakery</div></div>
  </div>
</div>
</body>
</html>
