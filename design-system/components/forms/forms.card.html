<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);font-family:var(--font-sans);}
  #root{padding:30px 32px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 28px;align-items:start;}
  .checks{display:flex;flex-direction:column;gap:14px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.GoodWebsitesDesignSystem_790400;
  function Demo(){
    return (
      <div className="grid">
        <Input label="Your name" placeholder="Posy Field" required />
        <Input label="Email" type="email" defaultValue="hello@" error="That doesn't look right" />
        <Select label="What do you need?" options={["A new website","A redesign","Branding","Not sure yet"]} />
        <Input label="Budget" hint="Ballpark is fine" placeholder="£5k–£15k" />
        <div className="checks">
          <Checkbox label="Keep me posted with good news" defaultChecked />
          <Checkbox label="I agree to the good vibes" />
        </div>
        <div className="checks">
          <Switch label="Show prices in USD" defaultChecked />
          <Switch label="Dark mode mockups" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
