<!-- @dsCard group="Components" viewport="700x440" name="Buttons, Badges, Tags & Cards" subtitle="Core actions and surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);font-family:var(--font-sans);}
  #root{padding:30px 32px;}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:26px;}
  .stack{display:flex;flex-direction:column;gap:6px;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
  .cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Badge, Tag, Card, Avatar } = window.GoodWebsitesDesignSystem_790400;
  function Demo(){
    return (
      <div>
        <div class="lbl">Buttons</div>
        <div className="row">
          <Button variant="primary">Start a project</Button>
          <Button variant="dark">See our work</Button>
          <Button variant="secondary">Say hello</Button>
          <Button variant="coral">Get a quote</Button>
          <Button variant="ghost">Maybe later</Button>
        </div>
        <div className="row">
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
        </div>
        <div class="lbl">Badges &amp; Tags</div>
        <div className="row">
          <Badge variant="sun">New</Badge>
          <Badge variant="solid">Featured</Badge>
          <Badge variant="success" dot>Live</Badge>
          <Badge variant="outline">Web design</Badge>
          <Tag color="sky">Branding</Tag>
          <Tag color="grass">SEO</Tag>
          <Tag color="coral" onRemove={()=>{}}>Removable</Tag>
          <Avatar name="Posy Field" />
          <Avatar name="Ravi Shah" />
        </div>
        <div class="lbl">Cards</div>
        <div className="cards">
          <Card variant="sticker"><strong style={{fontFamily:'var(--font-display)',fontSize:20}}>Sticker</strong><p style={{margin:'6px 0 0',color:'var(--text-muted)',fontSize:14}}>Ink outline + hard shadow.</p></Card>
          <Card variant="soft"><strong style={{fontFamily:'var(--font-display)',fontSize:20}}>Soft</strong><p style={{margin:'6px 0 0',color:'var(--text-muted)',fontSize:14}}>Warm floating shadow.</p></Card>
          <Card variant="ink"><strong style={{fontFamily:'var(--font-display)',fontSize:20}}>Ink</strong><p style={{margin:'6px 0 0',color:'var(--text-on-ink-muted)',fontSize:14}}>Dark feature block.</p></Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
