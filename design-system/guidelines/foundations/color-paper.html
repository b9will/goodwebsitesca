<!-- @dsCard group="Colors" viewport="700x180" name="Paper — Cream Neutrals" subtitle="Warm backgrounds, fills and lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--ink-900);color:var(--text-on-ink);}
  .wrap{padding:24px 28px;font-family:var(--font-sans);}
  .scale{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:72px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);}
  .name{font-size:var(--text-2xs);font-weight:700;}
  .hex{font-size:var(--text-2xs);color:var(--text-on-ink-muted);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><span class="name">paper-0</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><span class="name">paper-50</span><span class="hex">#FDFAF3</span></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><span class="name">paper-100</span><span class="hex">#FBF5E9</span></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><span class="name">paper-200</span><span class="hex">#F4EAD7</span></div>
    <div class="sw"><div class="chip" style="background:var(--paper-300)"></div><span class="name">paper-300</span><span class="hex">#E9DBC2</span></div>
    <div class="sw"><div class="chip" style="background:var(--paper-400)"></div><span class="name">paper-400</span><span class="hex">#D9C6A6</span></div>
  </div>
</div>
</body>
</html>
