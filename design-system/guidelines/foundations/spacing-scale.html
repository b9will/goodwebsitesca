<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="8px base grid, 4 → 128" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:22px 28px;font-family:var(--font-sans);display:flex;flex-direction:column;gap:7px;}
  .row{display:flex;align-items:center;gap:14px;}
  .bar{height:16px;background:var(--sun-400);border-radius:3px;}
  .name{font-size:var(--text-2xs);font-weight:700;width:64px;}
  .px{font-size:var(--text-2xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="name">space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="name">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="name">space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="name">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="name">space-5</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="row"><span class="name">space-6</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="name">space-7</span><span class="bar" style="width:40px"></span><span class="px">40px</span></div>
  <div class="row"><span class="name">space-8</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
  <div class="row"><span class="name">space-9</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
  <div class="row"><span class="name">space-10</span><span class="bar" style="width:80px"></span><span class="px">80px</span></div>
</div>
</body>
</html>
