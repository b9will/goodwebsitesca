<!-- @dsCard group="Colors" viewport="700x180" name="Sun — Primary" subtitle="The hero gold. Ink reads on top of it." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:24px 28px;font-family:var(--font-sans);}
  .scale{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:72px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(26,22,17,.06);}
  .name{font-size:var(--text-2xs);font-weight:700;letter-spacing:.02em;}
  .hex{font-size:var(--text-2xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .star{position:relative;}
  .star::after{content:"PRIMARY";position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--ink-900);background:rgba(255,255,255,.55);padding:2px 5px;border-radius:99px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--sun-100)"></div><span class="name">sun-100</span><span class="hex">#FFEFBF</span></div>
    <div class="sw"><div class="chip" style="background:var(--sun-200)"></div><span class="name">sun-200</span><span class="hex">#FFE08A</span></div>
    <div class="sw"><div class="chip" style="background:var(--sun-300)"></div><span class="name">sun-300</span><span class="hex">#FFD45E</span></div>
    <div class="sw"><div class="chip star" style="background:var(--sun-400)"></div><span class="name">sun-400</span><span class="hex">#FFC838</span></div>
    <div class="sw"><div class="chip" style="background:var(--sun-500)"></div><span class="name">sun-500</span><span class="hex">#FFBE1A</span></div>
    <div class="sw"><div class="chip" style="background:var(--sun-600)"></div><span class="name">sun-600</span><span class="hex">#F2A100</span></div>
    <div class="sw"><div class="chip" style="background:var(--sun-700)"></div><span class="name">sun-700</span><span class="hex">#C97F00</span></div>
  </div>
</div>
</body>
</html>
