<!-- @dsCard group="Colors" viewport="700x200" name="Poppy Accents" subtitle="Saturated colour blocks: coral, grass, sky, grape" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:24px 28px;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .pair{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(26,22,17,.06);}
  .pair span{height:64px;flex:1;}
  .label{font-size:var(--text-2xs);font-weight:700;}
  .hex{font-size:var(--text-2xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="col"><div class="pair"><span style="background:var(--coral-400)"></span><span style="background:var(--coral-500)"></span><span style="background:var(--coral-600)"></span></div><span class="label">Coral</span><span class="hex">#FF5A36</span></div>
    <div class="col"><div class="pair"><span style="background:var(--grass-400)"></span><span style="background:var(--grass-500)"></span><span style="background:var(--grass-600)"></span></div><span class="label">Grass</span><span class="hex">#12A45A</span></div>
    <div class="col"><div class="pair"><span style="background:var(--sky-400)"></span><span style="background:var(--sky-500)"></span><span style="background:var(--sky-600)"></span></div><span class="label">Sky</span><span class="hex">#2F6BFF</span></div>
    <div class="col"><div class="pair"><span style="background:var(--grape-400)"></span><span style="background:var(--grape-500)"></span><span style="background:var(--grape-600)"></span></div><span class="label">Grape</span><span class="hex">#6C4CF1</span></div>
  </div>
</div>
</body>
</html>
