<!-- @dsCard group="Colors" viewport="700x180" name="Ink — Text & Dark" subtitle="Warm near-blacks for type and dark sections" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:24px 28px;font-family:var(--font-sans);}
  .scale{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:72px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(26,22,17,.06);}
  .name{font-size:var(--text-2xs);font-weight:700;}
  .hex{font-size:var(--text-2xs);color:var(--text-muted);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">ink-900</span><span class="hex">#1A1611</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="name">ink-800</span><span class="hex">#2A241D</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="name">ink-700</span><span class="hex">#3C342A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="name">ink-600</span><span class="hex">#5A4F41</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><span class="name">ink-500</span><span class="hex">#7A6E5D</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><span class="name">ink-400</span><span class="hex">#A99C88</span></div>
  </div>
</div>
</body>
</html>
