<!-- @dsCard group="Type" viewport="700x300" name="Display — Excon" subtitle="Hero type set in Excon Medium, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:28px 32px;font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--border-soft);}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--font-display);line-height:1;letter-spacing:var(--tracking-tighter);color:var(--text-strong);}
  .meta{margin-left:auto;font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="spec" style="font-size:72px;font-weight:500;">Good ideas</span><span class="meta">display-xl · 500</span></div>
  <div class="row"><span class="spec" style="font-size:52px;font-weight:500;">grow in sunlight</span><span class="meta">display-lg · 500</span></div>
  <div class="row"><span class="spec" style="font-size:38px;font-weight:400;">We make good websites.</span><span class="meta">display-md · 400</span></div>
</div>
</body>
</html>
