<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & Label" subtitle="Uppercase Ranade with wide tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-page);color:var(--text-strong);}
  .wrap{padding:26px 32px;font-family:var(--font-sans);display:flex;flex-wrap:wrap;gap:28px;align-items:center;}
  .eyebrow{font-size:var(--text-2xs);font-weight:700;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--text-muted);}
  .eyebrow.sun{color:var(--sun-700);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--sun-500);display:inline-block;margin-right:8px;vertical-align:middle;}
</style>
</head>
<body>
<div class="wrap">
  <span class="eyebrow"><span class="dot"></span>Our Work</span>
  <span class="eyebrow sun">Services</span>
  <span class="eyebrow">Est. Good · 2026</span>
</div>
</body>
</html>
